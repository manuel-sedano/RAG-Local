# Override para activar WAF ModSecurity entre Traefik y el backend.
# Uso: docker compose -f docker-compose.yml -f docker-compose.waf.yml --profile waf up -d
# Con logs en Loki: añade --profile observability

services:
  traefik:
    volumes:
      - ./docker/traefik/dynamic/bootstrap-waf.yml:/etc/traefik/dynamic/bootstrap.yml:ro

  waf:
    # Tag con fecha (4-nginx-alpine sin fecha no existe en Docker Hub)
    image: ${WAF_IMAGE:-owasp/modsecurity-crs:4-nginx-alpine-202509220609}
    container_name: rag_waf
    profiles:
      - waf
    restart: unless-stopped
    networks:
      - rag_net
    environment:
      BACKEND: http://backend:80
      PORT: "8080"
      # Desde .env raíz (WAF_MODE=DetectionOnly | On | Off)
      MODSEC_RULE_ENGINE: ${WAF_MODE:-DetectionOnly}
      MODSEC_AUDIT_ENGINE: "On"
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_AUDIT_LOG_FORMAT: JSON
      # Alineado con MAX_UPLOAD_MB=50 (+ margen multipart)
      MAX_FILE_SIZE: "52428800"
      MODSEC_REQ_BODY_LIMIT: "52428800"
      PROXY_TIMEOUT: "300"
      SERVER_NAME: localhost
    volumes:
      - ./docker/waf/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/opt/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      - backend
    labels:
      - logging.promtail=true
      - logging.job=waf
