# Exclusiones mínimas RAG-local (antes del CRS).
# Upload multipart: la app valida MIME/magic/size; evitar falsos positivos en el cuerpo binario.
SecRule REQUEST_URI "@rx ^/api/kbs/[0-9a-f-]{36}/documents/upload$" \
    "id:900100,\
    phase:1,\
    pass,\
    nolog,\
    ctl:requestBodyAccess=Off"

# Health y métricas internas (sin cuerpo sensible)
SecRule REQUEST_URI "@streq /api/health" \
    "id:900101,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveByTag=OWASP_CRS"
