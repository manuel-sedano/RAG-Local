server {
    listen 80;
    server_name _;

    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /api/health {
        default_type application/json;
        return 200 '{"status":"ok","service":"backend-placeholder"}';
    }

    location /api/ {
        default_type application/json;
        return 200 '{"status":"ok","service":"backend-placeholder","note":"API placeholder"}';
    }
}
