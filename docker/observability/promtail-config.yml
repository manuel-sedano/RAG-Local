server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Contenedores Docker con label logging.promtail=true
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_logging_promtail"]
        regex: "true"
        action: keep
      - source_labels: ["__meta_docker_container_label_logging_job"]
        target_label: job
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            request_id: request_id
            document_id: document_id
            chat_id: chat_id
            kb_id: kb_id
            event: event
      - labels:
          level:
          service:
          event:

  # Logs JSONL del backend/worker en host (uvicorn / Celery local)
  - job_name: rag-app-files
    static_configs:
      - targets: [localhost]
        labels:
          job: rag-app-files
          __path__: /var/log/rag/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            request_id: request_id
            document_id: document_id
            chat_id: chat_id
            kb_id: kb_id
            event: event
            message: message
      - labels:
          level:
          service:
          event:
