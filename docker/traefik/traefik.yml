global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  # Provider Docker desactivado: en WSL + Docker Desktop el cliente embebido a veces
  # falla con "Error response from daemon" y Traefik no registra rutas (404 en :80).
  # Las rutas del bootstrap están en `dynamic/bootstrap.yml` (DNS interno: frontend, backend, …).
  # Para volver a labels en contenedores, reactiva `docker:` y el volumen del socket en compose.
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: true

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
